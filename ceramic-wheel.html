<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Paper Pottery</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,400;1,9..144,500&family=Archivo:wght@600;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#ece7dd; --ink:#14110d; --muted:#7c7466; --coral:#fb5a4b; --cobalt:#1f7fe0;
    --stage:#0d0d0c; --line:#d8d0c0; --vp-bg:linear-gradient(180deg,#ffffff 0%,#dce9f7 100%); --foot:#f4f0e8; --sld:84px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; margin:0; padding:0;}
  html,body{height:100%; background:var(--stage); font-family:"Archivo",sans-serif; color:var(--ink);}
  body{display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; padding:14px 0;}
  .appfoot{display:flex; align-items:center; gap:10px; color:#8a8276; font-size:12.5px; letter-spacing:.02em; font-weight:600;}
  .appfoot strong{color:#cfc8ba; font-weight:800;}
  .appfoot .creditlink{display:inline-flex; align-items:center; gap:10px; color:inherit; text-decoration:none; cursor:pointer;}
  .appfoot .creditlink:hover{color:#cfc8ba;}
  .appfoot .creditlink:hover strong{color:#fff;}
  .appfoot .creditlink:hover .iglink{color:#fff; box-shadow:inset 0 0 0 1px rgba(255,255,255,.4); transform:translateY(-1px);}
  .appfoot .iglink{display:inline-flex; align-items:center; justify-content:center; width:30px; height:30px; border-radius:9px; color:#cfc8ba; text-decoration:none;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.16); transition:color .15s, box-shadow .15s, transform .15s;}
  .appfoot .iglink:hover{color:#fff; box-shadow:inset 0 0 0 1px rgba(255,255,255,.4); transform:translateY(-1px);}

  .card{position:relative; width:min(440px,96vw); height:min(88vh,820px);
    border-radius:30px; overflow:hidden; display:flex; flex-direction:column;
    box-shadow:0 30px 80px rgba(0,0,0,.55), inset 0 0 0 1px rgba(0,0,0,.05);}
  .viewport{position:relative; flex:1 1 auto; min-height:0; background:var(--vp-bg);}
  canvas#gl{position:absolute; inset:0; width:100%; height:100%; touch-action:none;}
  .topbar{position:absolute; top:0; left:0; right:0; z-index:3; display:flex; align-items:center;
    justify-content:space-between; padding:18px 18px 0; pointer-events:none;}
  .badge{pointer-events:auto; border:2px solid var(--ink); border-radius:999px; padding:4px 14px 5px;
    font-weight:900; font-size:13px; letter-spacing:.14em; mix-blend-mode:multiply;}

  /* ----- control region: NO panel container; chips float over the soft background ----- */
  .dock{flex:0 0 auto; background:var(--vp-bg); display:flex; flex-direction:column; gap:11px;
    padding:14px 18px calc(16px + env(safe-area-inset-bottom));}
  .seg{display:flex; gap:6px;}
  .seg button{font-weight:800; font-size:12px; letter-spacing:.04em; padding:8px 14px; border-radius:999px;
    border:none; background:rgba(255,255,255,.55); color:#5b5347;
    -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px); box-shadow:inset 0 0 0 1px rgba(255,255,255,.65), 0 2px 8px rgba(80,90,120,.12);}
  .seg button.on{background:rgba(20,17,13,.92); color:#fff; box-shadow:0 3px 10px rgba(0,0,0,.2);}
  /* the only container: the step text card */
  .metaCard{display:flex; align-items:flex-end; gap:13px; align-self:flex-start; padding:11px 15px; border-radius:18px;
    background:rgba(255,255,255,.5); -webkit-backdrop-filter:blur(20px) saturate(150%); backdrop-filter:blur(20px) saturate(150%);
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.7), 0 6px 22px rgba(80,90,120,.16);}
  .bignum{font-weight:900; font-size:46px; line-height:.8; letter-spacing:-.02em;}
  .title{font-family:"Fraunces",serif; font-weight:600; font-size:22px; line-height:1;}
  .hint{font-family:"Fraunces",serif; font-style:italic; font-size:13.5px; color:#3c372e; line-height:1.32; margin-top:5px; max-width:260px;}
  .controls{display:flex; flex-direction:column; gap:11px;}
  .row{display:flex; align-items:center; gap:8px; flex-wrap:nowrap;}
  .chip{display:flex; align-items:center; gap:7px; background:rgba(255,255,255,.55); box-shadow:inset 0 0 0 1px rgba(255,255,255,.65), 0 2px 8px rgba(80,90,120,.12);
    -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px);
    border-radius:12px; padding:8px 10px; font-size:10.5px; font-weight:700; letter-spacing:.02em; color:#5b5347;}
  .chip label{flex:0 0 auto; min-width:34px;}
  input[type=range]{width:var(--sld); accent-color:#14110d; flex:0 0 auto;}
  .group{display:none;} .group.show{display:flex; flex-direction:column; gap:11px;}
  /* compact color swatch — tap to open the wheel */
  .cswatch{flex:0 0 auto; width:38px; height:38px; border-radius:11px; border:none; box-shadow:inset 0 0 0 2px rgba(255,255,255,.85), 0 3px 10px rgba(0,0,0,.18); background:#2f5d50; cursor:pointer;}
  .playbtn{flex:0 0 auto; background:rgba(255,255,255,.6); color:#14110d; font-size:13px; line-height:1; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:inset 0 0 0 1px rgba(255,255,255,.7), 0 2px 8px rgba(80,90,120,.14);}
  .playbtn.paused{background:var(--coral); color:#fff;}
  /* photoshop-style vertical layer stack */
  .layerstack{display:flex; flex-direction:column; gap:5px; align-self:stretch;}
  .lrow{display:flex; align-items:center; gap:10px; padding:7px 10px; border-radius:11px;
    background:rgba(255,255,255,.45); box-shadow:inset 0 0 0 1px rgba(255,255,255,.55);
    -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px); font-size:12px; font-weight:700; color:#5b5347;}
  .lrow.on{box-shadow:inset 0 0 0 2px #14110d; color:#14110d;}
  .lrow .thumb{width:22px; height:22px; border-radius:6px; box-shadow:inset 0 0 0 1px rgba(0,0,0,.12); background:#fff; display:block;}
  canvas.thumb{image-rendering:auto;}
  .lrow .grip{cursor:grab; color:#b8b0a2; font-size:12px; letter-spacing:-2px; line-height:1; user-select:none; touch-action:none; padding:0 1px;}
  .lrow .grip:active{cursor:grabbing;}
  .lrow .lx{font-size:12px; color:#bb7a9a; cursor:pointer; margin-left:2px;}
  .lrow.dragging{box-shadow:inset 0 0 0 2px #14110d, 0 8px 22px rgba(0,0,0,.28); background:rgba(255,255,255,.92); position:relative;}
  .lrow .lname{flex:1;}
  .lrow.bg{background:rgba(255,255,255,.62);}
  .hidden{display:none !important;}
  .actions{display:flex; gap:8px; margin-top:2px;}
  .btn{font-weight:800; font-size:13px; padding:11px 16px; border-radius:13px; border:none; color:#14110d;
    background:rgba(255,255,255,.6); box-shadow:inset 0 0 0 1px rgba(255,255,255,.7); letter-spacing:.03em;}
  .btn.primary{background:var(--coral); color:#fff; box-shadow:none;}
  /* frosted popover (color wheel / glaze) */
  .scrim{position:absolute; inset:0; z-index:7; display:none;}
  .scrim.show{display:block;}
  .popover{position:absolute; left:50%; transform:translateX(-50%); bottom:0; z-index:8; display:none;
    flex-direction:column; align-items:center; gap:12px; padding:18px; border-radius:22px;
    background:rgba(255,255,255,.6); -webkit-backdrop-filter:blur(30px) saturate(160%); backdrop-filter:blur(30px) saturate(160%);
    box-shadow:0 -8px 40px rgba(0,0,0,.22), inset 0 0 0 1px rgba(255,255,255,.7); width:min(360px,90%);}
  .popover.show{display:flex;}
  .poptitle{font-family:"Fraunces",serif; font-style:italic; font-size:16px; color:#2c2820; align-self:flex-start;}
  .wheelrow{display:flex; align-items:center; gap:16px;}
  #wheel{width:150px; height:150px; border-radius:50%; box-shadow:0 6px 20px rgba(0,0,0,.2); touch-action:none;}
  .valwrap{display:flex; flex-direction:column; align-items:center; gap:8px;}
  #val{width:16px; height:120px; writing-mode:vertical-lr; direction:rtl; accent-color:#14110d;}
  .swatchbig{width:34px; height:34px; border-radius:9px; box-shadow:inset 0 0 0 2px rgba(255,255,255,.85),0 2px 8px rgba(0,0,0,.2);}
  .seg2{display:flex; border-radius:999px; overflow:hidden; box-shadow:inset 0 0 0 1.5px #14110d;}
  .seg2 button{font-weight:800; font-size:11px; padding:6px 14px; background:transparent; border:none; color:#14110d;}
  .seg2 button.on{background:#14110d; color:#fff;}

  #exportView{position:fixed; inset:0; z-index:30; background:rgba(8,9,12,.96); -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px); display:none; align-items:center; justify-content:center; padding:14px;}
  #exportView.show{display:flex;}
  .sheet{position:relative; width:min(940px,96vw); max-height:95vh; background:linear-gradient(180deg,#191b21,#101116); border-radius:20px;
    overflow:hidden; display:flex; flex-direction:column; box-shadow:0 40px 100px rgba(0,0,0,.7), inset 0 0 0 1px rgba(255,255,255,.07);}
  .sheethead{display:flex; align-items:center; justify-content:space-between; padding:14px 18px 12px; border-bottom:1px solid rgba(255,255,255,.07);}
  .sheettitle{display:flex; align-items:baseline; gap:11px;}
  .sheettitle .eyebrow{font-family:"Archivo",sans-serif; font-weight:800; font-size:10px; letter-spacing:.22em; color:#6f7787;
    border:1px solid rgba(255,255,255,.16); padding:4px 8px; border-radius:7px;}
  .sheettitle .pgname{font-family:"Fraunces",serif; font-weight:600; font-size:19px; color:#f1ece2;}
  .closeX{width:30px; height:30px; border:none; background:rgba(255,255,255,.06); border-radius:9px; font-size:20px; line-height:1; color:#cfcabf; cursor:pointer; transition:background .15s, color .15s;}
  .closeX:hover{background:rgba(255,255,255,.14); color:#fff;}
  .preview{flex:1 1 auto; min-height:0; overflow:auto; padding:16px 20px; display:flex; align-items:center; justify-content:center; background:
    radial-gradient(120% 90% at 50% -10%, rgba(120,150,200,.07), transparent 60%);}
  #netCanvas{display:block; max-width:100%; max-height:56vh; width:auto; height:auto; border-radius:6px; box-shadow:0 18px 46px rgba(0,0,0,.55), 0 0 0 1px rgba(0,0,0,.4); background:#fff;}
  .pcap{font-family:"Fraunces",serif; font-style:italic; font-size:12.5px; color:#9aa0ab; padding:0 24px 8px; line-height:1.4; text-align:center; max-width:680px; margin:0 auto;}
  /* macOS-style thumbnail filmstrip (landscape, matching the A4 pages) */
  .filmstrip{display:flex; gap:14px; justify-content:center; align-items:flex-end; padding:9px 18px; background:rgba(0,0,0,.28); border-top:1px solid rgba(255,255,255,.07); flex-wrap:nowrap;}
  .thumb-pg{position:relative; cursor:pointer; border:none; background:none; padding:0; display:flex; flex-direction:column; align-items:center; gap:6px; opacity:.62; transition:opacity .18s, transform .18s;}
  .thumb-pg:hover{opacity:.9; transform:translateY(-2px);}
  .thumb-pg.on{opacity:1;}
  .thumb-pg canvas{width:74px; height:52px; border-radius:4px; background:#fff; box-shadow:0 4px 12px rgba(0,0,0,.5); outline:1.5px solid transparent; transition:outline-color .18s, box-shadow .18s;}
  .thumb-pg.on canvas{outline-color:var(--coral); box-shadow:0 6px 18px rgba(251,90,75,.4);}
  .thumb-pg .tlabel{font-family:"Archivo",sans-serif; font-weight:700; font-size:8.5px; letter-spacing:.1em; color:#7c828e;}
  .thumb-pg.on .tlabel{color:#e9e5dc;}
  .sheetfoot{display:flex; gap:12px; justify-content:space-between; align-items:center; padding:11px 18px 14px;}
  .igexport{display:flex; align-items:center; gap:7px;}
  .igexport .igicon{color:#8a909c; flex:0 0 auto;}
  .nameinput{flex:0 1 200px; min-width:120px; background:rgba(255,255,255,.07); color:#f1ece2; border:none; outline:none;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.16); border-radius:10px; padding:8px 12px; font-family:"Fraunces",serif; font-style:italic; font-size:14px;}
  .nameinput::placeholder{color:#7c828e; font-style:italic;}
  .nameinput:focus{box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.42);}
  .igbtn{background:rgba(255,255,255,.08); color:#e9e5dc; box-shadow:inset 0 0 0 1px rgba(255,255,255,.16); padding:8px 11px; display:inline-flex; align-items:center; gap:6px;}
  .igbtn:hover{background:rgba(255,255,255,.16);}
  .igbtn .dli{opacity:.72; flex:0 0 auto;}
  .igbtn:hover .dli{opacity:1;}
  #download{display:inline-flex; align-items:center; gap:7px;}
  #download .dli{flex:0 0 auto; opacity:.9;}
  /* (end export styles) */
  /* ----- iPad / wide landscape: pot+plate on the left, controls float on the right ----- */
  @media (min-width:760px) and (orientation:landscape){
    .card{width:min(1040px,96vw); height:min(90vh,720px); flex-direction:row;}
    .viewport{flex:1 1 auto;}
    .dock{flex:0 0 320px; justify-content:center; overflow-y:auto;
      padding:20px 22px calc(20px + env(safe-area-inset-bottom));}
    .hint{max-width:260px;}
    #layersToggle{display:none;}
    .layerstack.collapsed{display:flex !important;}
    .card{--sld:60px;}
    #g-paint .row{flex-wrap:wrap;}
    #g-paint .row > .chip:not(.flowchip){flex:1 1 auto;}     /* BRUSH fills line 1 after the swatch */
    #g-paint .flowchip{flex:0 0 auto; width:calc(100% - 46px); margin-left:46px;}  /* 38px swatch + 8px gap */
    #g-paint .chip{flex:1 1 auto;}
    #g-paint .chip input[type=range]{flex:1 1 auto; width:auto;}
    #g-common .chip{flex:1 1 auto;}
    #g-common .chip input[type=range]{flex:1 1 auto; width:auto;}
    .sheet{max-height:96vh;}
    #netCanvas{max-height:48vh;}
  }
  /* control surface uses the light defaults above */
  /* layers accordion */
  .accordion{justify-content:space-between; cursor:pointer; align-self:stretch;}
  #layersCaret{display:inline-block; transition:transform .2s ease; line-height:1; font-size:13px;} #layersCaret.open{transform:rotate(180deg);}
  .layerstack.collapsed{display:none;}
  /* ---- phones: stack the export footer, wrap buttons, scroll the filmstrip ---- */
  @media (max-width:600px){
    .sheetfoot{flex-direction:column; align-items:stretch; gap:10px; padding:12px 14px calc(14px + env(safe-area-inset-bottom));}
    .igexport{flex-wrap:wrap; justify-content:flex-start; gap:8px;}
    .nameinput{flex:1 1 100%; min-width:0; order:-1;}            /* name field on its own full-width row, first */
    .igbtn{flex:1 1 0; justify-content:center; min-width:64px;}  /* 1:1 / 3:4 / 360 share a row evenly */
    .igexport .igicon{display:none;}                            /* drop the decorative icon to save width */
    #download{width:100%; justify-content:center; padding:12px;}
    .filmstrip{justify-content:flex-start; overflow-x:auto; -webkit-overflow-scrolling:touch; gap:10px; padding:8px 12px;}
    .thumb-pg{flex:0 0 auto;}
    .thumb-pg canvas{width:64px; height:45px;}
  }
</style>
</head>
<body>
<div id="errbar" style="display:none;position:fixed;left:0;right:0;top:0;z-index:9999;background:#b3261e;color:#fff;font:600 12px/1.4 monospace;padding:8px 12px;white-space:pre-wrap;"></div>
<script>window.addEventListener('error',function(e){var b=document.getElementById('errbar');if(b){b.style.display='block';b.textContent='JS ERROR: '+(e.message||e.error)+'  @ line '+(e.lineno||'?');}});</script>
<div class="card">
  <div class="viewport">
    <canvas id="gl"></canvas>
    <div class="topbar"><div class="badge">PAPER POTTERY</div></div>
  </div>

  <div class="dock">
    <div class="seg" id="modes">
      <button class="on" data-mode="height">SCALE</button>
      <button data-mode="shape">SHAPE</button>
      <button data-mode="paint">GLAZE</button>
    </div>
    <div class="metaCard">
      <div class="bignum" id="bignum">01</div>
      <div><div class="title" id="title">Scale</div>
        <div class="hint" id="hint">Drag up and down to pull the height. One or two fingers.</div></div>
    </div>
    <div class="controls">
      <div class="group show" id="g-common">
        <div class="row"><button class="cswatch playbtn" id="playPause" title="Pause / play spin" aria-label="Pause spin">❚❚</button><span class="chip"><label>SPIN</label><input type="range" id="spin" min="8" max="100" step="0.01" value="42"></span></div>
      </div>
      <div class="group" id="g-paint">
        <div class="row">
          <button class="cswatch" id="brushSwatch" title="Brush colour"></button>
          <span class="chip"><label>BRUSH</label><input type="range" id="brush" min="3" max="130" value="26"></span>
          <span class="chip flowchip"><label>FLOW</label><input type="range" id="flow" min="4" max="100" value="80"></span>
        </div>
        <button class="chip accordion" id="layersToggle"><span>LAYERS</span><span id="layersCaret">⌄</span></button>
        <div class="layerstack collapsed" id="layers"></div>
      </div>
      <div class="actions">
        <button class="btn" id="reset">RESET SCALE</button>
        <button class="btn primary" id="export">EXPORT →</button>
      </div>
    </div>
  </div>

  <!-- frosted popovers -->
  <div class="scrim" id="scrim"></div>
  <div class="popover" id="wheelPop">
    <div class="poptitle" id="wheelTitle">Brush colour</div>
    <div class="wheelrow">
      <canvas id="wheel" width="150" height="150"></canvas>
      <div class="valwrap"><input type="range" id="val" min="6" max="100" value="62"><div class="swatchbig" id="curSwatch"></div></div>
    </div>
    <button class="btn" id="wheelDone" style="align-self:stretch;">DONE</button>
  </div>
  <div class="popover" id="glazePop">
    <div class="poptitle">Base colour</div>
    <div class="row" style="align-items:center;justify-content:space-between;width:100%;">
      <div class="seg2" id="glMode"><button data-m="flat">FLAT</button><button data-m="gradient" class="on">GRADIENT</button></div>
      <div class="row" id="glSwatches">
        <button class="cswatch" id="glAsw" title="Rim"></button>
        <button class="cswatch" id="glBsw" title="Foot"></button>
      </div>
    </div>
    <button class="btn" id="glazeDone" style="align-self:stretch;">DONE</button>
  </div>
</div>

<footer class="appfoot">
  <a class="creditlink" href="https://www.instagram.com/ashish_john_mundu/" target="_blank" rel="noopener noreferrer" aria-label="Created by Sheesh, visit Instagram: @ashish_john_mundu" title="@ashish_john_mundu">
    <span>Created by <strong>Sheesh</strong></span>
    <span class="iglink">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="20" height="20" rx="5.5"/>
        <circle cx="12" cy="12" r="4.2"/>
        <circle cx="17.6" cy="6.4" r="1.2" fill="currentColor" stroke="none"/>
      </svg>
    </span>
  </a>
</footer>

<div id="exportView">
  <div class="sheet">
    <div class="sheethead">
      <div class="sheettitle"><span class="eyebrow">EXPORT</span></div>
      <button class="closeX" id="closeExport" aria-label="Close">×</button>
    </div>
    <div class="preview"><canvas id="netCanvas"></canvas></div>
    <div class="pcap" id="exportCap"></div>
    <div class="filmstrip" id="filmstrip"></div>
    <div class="sheetfoot">
      <div class="igexport" title="Save a post-ready image">
        <svg class="igicon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="3.2"/><circle cx="8.5" cy="8.5" r="1.6"/><path d="M21 15l-5-5L5 21"/>
        </svg>
        <input type="text" id="pieceName" class="nameinput" placeholder="Name your piece (optional)" maxlength="40" autocomplete="off">
        <button class="btn igbtn" id="ig11" title="Image export · 1200 × 1200"><svg class="dli" viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M7 11l5 5 5-5M4 21h16"/></svg>1:1</button>
        <button class="btn igbtn" id="ig34" title="Image export · 1080 × 1440"><svg class="dli" viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M7 11l5 5 5-5M4 21h16"/></svg>3:4</button>
        <button class="btn igbtn" id="igvid" title="Video export · 1080 × 1080 · 360° MP4"><svg class="dli" viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M7 11l5 5 5-5M4 21h16"/></svg>360°</button>
      </div>
      <button class="btn primary" id="download" title="Print export · A4 PDF"><svg class="dli" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M7 11l5 5 5-5M4 21h16"/></svg>A4 PDF</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
/* ============================================================ PAPER POTTERY v5 ============================================================ */
const NSEG=80, TEX_W=2400, TEX_H=1200, MIN_R=0.18, MAX_R=1.7, UNIT_CM=2.1, NUM_LAYERS=4;
const CREAM='#ece7dd', CORAL='#fb5a4b', COBALT='#1f7fe0', GREEN='#1f9d57', RED='#e23b3b';
let mode='height', spinSpeed=0.0334, height=2.6, paused=false;
let R=new Float32Array(NSEG+1).fill(0.9);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

/* editable glaze gradient ON THE POT; page background is a constant white→light-blue */
let glaze={mode:'gradient', a:'#5a93d0', b:'#021c4f'};
const INK='#14110d';
const PAGEBG=['#ffffff','#dce9f7'];
function inkColor(){return INK;}
function fillBg(ctx,W,H){const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,PAGEBG[0]);g.addColorStop(1,PAGEBG[1]);ctx.fillStyle=g;ctx.fillRect(0,0,W,H);}

/* ---------- three.js ---------- */
const canvas=document.getElementById('gl');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true,preserveDrawingBuffer:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.setClearColor(0x000000,0);
const scene=new THREE.Scene(); scene.background=null;
const camera=new THREE.PerspectiveCamera(42,1,0.1,100); camera.position.set(0,0.5,6.3); camera.lookAt(0,0.05,0);
scene.add(new THREE.AmbientLight(0xffffff,0.78));
const key=new THREE.DirectionalLight(0xffffff,0.95); key.position.set(2.5,5,4); scene.add(key);
const rim=new THREE.DirectionalLight(0xcfe0f3,0.5); rim.position.set(-4,2,-3); scene.add(rim);
const fillL=new THREE.DirectionalLight(0xffffff,0.28); fillL.position.set(0,-3,5); scene.add(fillL);
const base=new THREE.Mesh(new THREE.CylinderGeometry(1.95,2.05,0.12,72),new THREE.MeshStandardMaterial({color:0xdfe6ee,roughness:.6}));
base.position.y=-height/2-0.06; scene.add(base);
/* two tiny black dots, printed flat on the plate top, 180° apart — mark front & back */
const dotGeo=new THREE.CircleGeometry(0.05,28);
const dotMat=new THREE.MeshBasicMaterial({color:0x141414});
dotMat.polygonOffset=true; dotMat.polygonOffsetFactor=-1; dotMat.polygonOffsetUnits=-1;
const dotF=new THREE.Mesh(dotGeo,dotMat); dotF.rotation.x=-Math.PI/2; dotF.position.set(0,0.0605,1.5); base.add(dotF);
const dotB=new THREE.Mesh(dotGeo,dotMat); dotB.rotation.x=-Math.PI/2; dotB.position.set(0,0.0605,-1.5); base.add(dotB);

/* glaze: editable gradient/flat on the pot + cached striation/ring/seam overlay */
const clayBase=document.createElement('canvas');clayBase.width=TEX_W;clayBase.height=TEX_H;
const clayBump=document.createElement('canvas');clayBump.width=TEX_W;clayBump.height=TEX_H;
const glOverlay=document.createElement('canvas');glOverlay.width=TEX_W;glOverlay.height=TEX_H;
(function(){const o=glOverlay.getContext('2d');
  // soft, smooth vertical grain only (no hard rings) — like the reference
  for(let x=0;x<TEX_W;x++){const n=Math.sin(x*0.085)*0.5+Math.sin(x*0.029)*0.5+(Math.random()-0.5)*0.22;
    o.fillStyle=`rgba(${n>0?15:255},${n>0?35:255},${n>0?70:255},${Math.abs(n)*0.026})`;o.fillRect(x,0,1,TEX_H);}
  // a whisper of a seam so rotation still reads
  o.fillStyle='rgba(10,25,45,0.07)';o.fillRect(0,0,3,TEX_H);
  const b=clayBump.getContext('2d');b.fillStyle='#808080';b.fillRect(0,0,TEX_W,TEX_H);
  for(let x=0;x<TEX_W;x++){const n=Math.sin(x*0.085)*0.5+Math.sin(x*0.029)*0.5;b.fillStyle=`rgba(${n>0?90:180},${n>0?90:180},${n>0?90:180},${Math.abs(n)*0.22})`;b.fillRect(x,0,1,TEX_H);}
})();
function drawGlaze(){const c=clayBase.getContext('2d');
  if(glaze.mode==='gradient'){const g=c.createLinearGradient(0,0,0,TEX_H);g.addColorStop(0,glaze.a);g.addColorStop(1,glaze.b);c.fillStyle=g;}
  else c.fillStyle=glaze.a;
  c.fillRect(0,0,TEX_W,TEX_H);c.drawImage(glOverlay,0,0);}
drawGlaze();

let activeLayer=0;
const layerC=[];for(let i=0;i<NUM_LAYERS;i++){const c=document.createElement('canvas');c.width=TEX_W;c.height=TEX_H;layerC.push(c);}
let layerOrder=[0,1,2,3];   // canvas indices, bottom → top (paint order)
const texCanvas=document.createElement('canvas');texCanvas.width=TEX_W;texCanvas.height=TEX_H;const texCtx=texCanvas.getContext('2d');
const texture=new THREE.CanvasTexture(texCanvas);texture.colorSpace=THREE.SRGBColorSpace;
texture.anisotropy=(renderer.capabilities&&renderer.capabilities.getMaxAnisotropy)?renderer.capabilities.getMaxAnisotropy():8;
texture.minFilter=THREE.LinearMipmapLinearFilter;texture.magFilter=THREE.LinearFilter;texture.generateMipmaps=true;
const bumpTex=new THREE.CanvasTexture(clayBump);
function composite(){texCtx.clearRect(0,0,TEX_W,TEX_H);texCtx.drawImage(clayBase,0,0);for(const idx of layerOrder)texCtx.drawImage(layerC[idx],0,0);texture.needsUpdate=true;
  if(thumbsReady)scheduleThumbs();}
let thumbsReady=false,_thumbT=0;function scheduleThumbs(){const now=performance.now();if(now-_thumbT<120)return;_thumbT=now;updateLayerThumbs();}
composite();
const clayMat=new THREE.MeshStandardMaterial({map:texture,bumpMap:bumpTex,bumpScale:0.008,roughness:0.4,metalness:0.06,side:THREE.DoubleSide});
let pot=null;
function build(){const pts=[];for(let i=0;i<=NSEG;i++)pts.push(new THREE.Vector2(Math.max(R[i],MIN_R*0.5),-height/2+(i/NSEG)*height));
  const geo=new THREE.LatheGeometry(pts,128);if(!pot){pot=new THREE.Mesh(geo,clayMat);scene.add(pot);}else{pot.geometry.dispose();pot.geometry=geo;}}
build();
function p_maxR(){let m=0;for(let i=0;i<=NSEG;i++)m=Math.max(m,R[i]);return m;}
function resize(){const w=canvas.clientWidth||1,h=canvas.clientHeight||1;renderer.setSize(w,h,false);camera.aspect=w/h;
  // fit the whole pot + plate within the viewport (so the controls panel never crops it)
  const topY=height/2, botY=-height/2-0.12;          // pot rim down to under the plate
  const cy=(topY+botY)/2;                              // vertical centre of the subject
  const halfH=(topY-botY)/2+0.35;                      // vertical half-extent + margin
  const halfW=2.15;                                    // plate radius (~2) + margin
  const vFov=camera.fov*Math.PI/180,t=Math.tan(vFov/2);
  const distV=halfH/t, distH=halfW/(t*camera.aspect);
  const dist=Math.min(9,Math.max(4.0,distV,distH))*1.04;
  camera.position.set(0,cy,dist);camera.lookAt(0,cy,0);camera.updateProjectionMatrix();}
new ResizeObserver(resize).observe(canvas);resize();
function tick(){
  if(!paused){pot.rotation.y+=spinSpeed;base.rotation.y+=spinSpeed;
    if(mode==='paint'&&paintHeld.size){paintHeld.forEach((pos,id)=>{setNDCxy(pos.x,pos.y);paintAt(id);});}}
  renderer.render(scene,camera);requestAnimationFrame(tick);}
tick();

/* ---------- multi-touch: subtractive carving from both sides ---------- */
const raycaster=new THREE.Raycaster(),ndc=new THREE.Vector2();
const pointers=new Map(),paintLast=new Map(),paintHeld=new Map();
function setNDCxy(cx,cy){const r=canvas.getBoundingClientRect();ndc.x=((cx-r.left)/r.width)*2-1;ndc.y=-((cy-r.top)/r.height)*2+1;}
function setNDC(e){setNDCxy(e.clientX,e.clientY);}
function hit(){raycaster.setFromCamera(ndc,camera);const h=raycaster.intersectObject(pot,false);return h.length?h[0]:null;}
canvas.addEventListener('pointerdown',e=>{canvas.setPointerCapture(e.pointerId);pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(mode==='paint'){setNDC(e);paintLast.delete(e.pointerId);paintHeld.set(e.pointerId,{x:e.clientX,y:e.clientY});paintAt(e.pointerId);}});
canvas.addEventListener('pointermove',e=>{const p=pointers.get(e.pointerId);if(!p)return;
  const dx=e.clientX-p.x,dy=e.clientY-p.y;setNDC(e);
  if(mode==='height'){height=clamp(height-dy*0.012,1.2,4.6);base.position.y=-height/2-0.06;build();resize();}
  else if(mode==='shape'){carve(dx);}else if(mode==='paint'){paintHeld.set(e.pointerId,{x:e.clientX,y:e.clientY});paintAt(e.pointerId);}
  pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});});
function endPtr(e){pointers.delete(e.pointerId);paintLast.delete(e.pointerId);paintHeld.delete(e.pointerId);}
canvas.addEventListener('pointerup',endPtr);canvas.addEventListener('pointercancel',endPtr);
/* carve: only inward (toward the axis). A finger on the right that moves left removes clay; same on the left moving right. */
function carve(dx){const h=hit();if(!h)return;const t=clamp((h.point.y+height/2)/height,0,1);const idx=Math.round(t*NSEG);
  const side=h.point.x>=0?1:-1;const inward=side>0?-dx:dx;const amt=Math.max(0,inward)*0.007;if(amt<=0)return;
  const sigma=NSEG/14;
  for(let i=0;i<=NSEG;i++){
    // near the rim, don't let the Gaussian fall off above the touch — keep full strength up to the lip
    const d=(idx>=NSEG-Math.round(sigma*1.5)&&i>idx)?0:(i-idx);
    const w=Math.exp(-(d*d)/(2*sigma*sigma));
    R[i]=clamp(R[i]-amt*w,MIN_R,R[i]);
  }
  // only the very top necks IN: across the top 4 rings the wall must not widen toward the lip
  for(let i=Math.max(idx,NSEG-4);i<NSEG;i++){if(R[i+1]>R[i])R[i+1]=R[i];}
  build();}
function paintAt(id){const h=hit();if(!h||!h.uv){paintLast.delete(id);return;}
  const x=h.uv.x*TEX_W,y=(1-h.uv.y)*TEX_H;const ctx=layerC[activeLayer].getContext('2d');
  ctx.fillStyle=currentColor();ctx.globalAlpha=+document.getElementById('flow').value/100;
  const size=+document.getElementById('brush').value;dab(ctx,x,y,size);const last=paintLast.get(id);
  if(last&&Math.abs(x-last.x)<TEX_W*0.5){const steps=Math.ceil(Math.hypot(x-last.x,y-last.y)/(size*0.28));
    for(let s=1;s<steps;s++)dab(ctx,last.x+(x-last.x)*s/steps,last.y+(y-last.y)*s/steps,size);}
  ctx.globalAlpha=1;paintLast.set(id,{x,y});composite();}
function dab(ctx,x,y,s){ctx.beginPath();ctx.arc(x,y,s/2,0,7);ctx.fill();
  if(x<s){ctx.beginPath();ctx.arc(x+TEX_W,y,s/2,0,7);ctx.fill();}if(x>TEX_W-s){ctx.beginPath();ctx.arc(x-TEX_W,y,s/2,0,7);ctx.fill();}}

/* ---------- colour: one wheel, retargetable (brush / glaze rim / glaze foot) ---------- */
const wheel=document.getElementById('wheel'),wctx=wheel.getContext('2d');
let brush={h:212,s:0.78,v:0.62};
let curH=brush.h,curS=brush.s,curV=brush.v,wheelTarget='brush';
function hsv2rgb(h,s,v){h/=60;const i=Math.floor(h),f=h-i,p=v*(1-s),q=v*(1-s*f),t=v*(1-s*(1-f));let r,g,b;
  switch(i%6){case 0:r=v;g=t;b=p;break;case 1:r=q;g=v;b=p;break;case 2:r=p;g=v;b=t;break;case 3:r=p;g=q;b=v;break;case 4:r=t;g=p;b=v;break;default:r=v;g=p;b=q;}
  return[Math.round(r*255),Math.round(g*255),Math.round(b*255)];}
function hsv2hex(h,s,v){return '#'+hsv2rgb(h,s,v).map(n=>n.toString(16).padStart(2,'0')).join('');}
function hex2hsv(hex){const c=hex.replace('#','');const r=parseInt(c.substr(0,2),16)/255,g=parseInt(c.substr(2,2),16)/255,b=parseInt(c.substr(4,2),16)/255;
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn;let h=0;if(d){if(mx===r)h=((g-b)/d+6)%6;else if(mx===g)h=(b-r)/d+2;else h=(r-g)/d+4;h*=60;}return[h,mx?d/mx:0,mx];}
function currentColor(){const[r,g,b]=hsv2rgb(brush.h,brush.s,brush.v);return`rgb(${r},${g},${b})`;}
function drawWheel(){const Rr=wheel.width/2,img=wctx.createImageData(wheel.width,wheel.height),d=img.data;
  for(let y=0;y<wheel.height;y++)for(let x=0;x<wheel.width;x++){const dx=x-Rr,dy=y-Rr,r=Math.hypot(dx,dy),idx=(y*wheel.width+x)*4;
    if(r<=Rr){const h=(Math.atan2(dy,dx)*180/Math.PI+360)%360,s=Math.min(r/Rr,1);const[rr,gg,bb]=hsv2rgb(h,s,curV);d[idx]=rr;d[idx+1]=gg;d[idx+2]=bb;d[idx+3]=255;}else d[idx+3]=0;}
  wctx.putImageData(img,0,0);const ang=curH*Math.PI/180,rr=curS*Rr,sx=Rr+Math.cos(ang)*rr,sy=Rr+Math.sin(ang)*rr;
  wctx.beginPath();wctx.arc(sx,sy,7,0,7);wctx.lineWidth=3;wctx.strokeStyle='#fff';wctx.stroke();wctx.lineWidth=1.4;wctx.strokeStyle='#000';wctx.stroke();
  const sw=document.getElementById('curSwatch');if(sw)sw.style.background=hsv2hex(curH,curS,curV);}
function updateSwatches(){const bs=document.getElementById('brushSwatch');if(bs)bs.style.background=currentColor();
  const a=document.getElementById('glAsw'),b=document.getElementById('glBsw'),bt=document.getElementById('bgThumb');
  if(a)a.style.background=glaze.a;if(b)b.style.background=glaze.b;
  if(bt)bt.style.background=glaze.mode==='gradient'?`linear-gradient(180deg,${glaze.a},${glaze.b})`:glaze.a;}
function applyWheel(){if(wheelTarget==='brush'){brush.h=curH;brush.s=curS;brush.v=curV;}
  else if(wheelTarget==='glazeA'){glaze.a=hsv2hex(curH,curS,curV);drawGlaze();composite();}
  else if(wheelTarget==='glazeB'){glaze.b=hsv2hex(curH,curS,curV);drawGlaze();composite();}updateSwatches();}
function pickFromWheel(e){const r=wheel.getBoundingClientRect(),Rr=wheel.width/2;
  const x=(e.clientX-r.left)/r.width*wheel.width-Rr,y=(e.clientY-r.top)/r.height*wheel.height-Rr;
  curH=(Math.atan2(y,x)*180/Math.PI+360)%360;curS=Math.min(Math.hypot(x,y)/Rr,1);drawWheel();applyWheel();}
let wheelDown=false;
wheel.addEventListener('pointerdown',e=>{wheelDown=true;wheel.setPointerCapture(e.pointerId);pickFromWheel(e);});
wheel.addEventListener('pointermove',e=>{if(wheelDown)pickFromWheel(e);});
wheel.addEventListener('pointerup',()=>wheelDown=false);
document.getElementById('val').addEventListener('input',e=>{curV=+e.target.value/100;drawWheel();applyWheel();});
const scrim=document.getElementById('scrim'),wheelPop=document.getElementById('wheelPop'),glazePop=document.getElementById('glazePop');
function openWheel(target){wheelTarget=target;const hsv=target==='brush'?[brush.h,brush.s,brush.v]:hex2hsv(target==='glazeA'?glaze.a:glaze.b);
  curH=hsv[0];curS=hsv[1];curV=hsv[2];document.getElementById('val').value=Math.round(curV*100);drawWheel();
  document.getElementById('wheelTitle').textContent=target==='brush'?'Brush colour':target==='glazeA'?'Glaze · rim':'Glaze · foot';
  glazePop.classList.remove('show');wheelPop.classList.add('show');scrim.classList.add('show');}
function openGlaze(){wheelPop.classList.remove('show');glazePop.classList.add('show');scrim.classList.add('show');}
function closePops(){wheelPop.classList.remove('show');glazePop.classList.remove('show');scrim.classList.remove('show');}
scrim.addEventListener('click',closePops);
document.getElementById('wheelDone').addEventListener('click',closePops);
document.getElementById('glazeDone').addEventListener('click',closePops);
document.getElementById('brushSwatch').addEventListener('click',()=>openWheel('brush'));
document.getElementById('glAsw').addEventListener('click',()=>openWheel('glazeA'));
document.getElementById('glBsw').addEventListener('click',()=>openWheel('glazeB'));
document.querySelectorAll('#glMode button').forEach(btn=>btn.addEventListener('click',()=>{
  document.querySelectorAll('#glMode button').forEach(x=>x.classList.remove('on'));btn.classList.add('on');
  glaze.mode=btn.dataset.m;document.getElementById('glBsw').classList.toggle('hidden',glaze.mode!=='gradient');drawGlaze();composite();updateSwatches();}));
drawWheel();updateSwatches();

/* ---------- glaze controls now live in the glaze popover (wired above) ---------- */

/* ---------- mode UI ---------- */
const META={height:['01','Scale','Drag up and down to pull the height. One or two fingers.'],
  shape:['02','Shape','Press inward from either side to carve the wall. Two fingers work like hands. Clay is only ever removed.'],
  paint:['03','Glaze','Paint the turning form. Pick a colour from the wheel; four layers, over-painted.']};
document.querySelectorAll('#modes button').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('#modes button').forEach(x=>x.classList.remove('on'));t.classList.add('on');
  mode=t.dataset.mode;const m=META[mode];document.getElementById('bignum').textContent=m[0];
  document.getElementById('title').textContent=m[1];document.getElementById('hint').textContent=m[2];
  document.getElementById('g-paint').classList.toggle('show',mode==='paint');
  document.getElementById('g-common').classList.add('show');
  syncPlayForMode();
  document.getElementById('reset').textContent='RESET '+(mode==='height'?'SCALE':mode==='shape'?'SHAPE':'GLAZE');
  closePops();paintLast.clear();
  if(window.gtag)gtag('event','mode_switch',{mode:t.dataset.mode});}));
document.getElementById('spin').addEventListener('input',e=>spinSpeed=Math.pow(+e.target.value/100,1.7)*0.146575);
const playBtn=document.getElementById('playPause');
function setPlay(p){paused=p;playBtn.classList.toggle('paused',paused);playBtn.textContent=paused?'▶':'❚❚';
  playBtn.setAttribute('aria-label',paused?'Play spin':'Pause spin');}
playBtn.addEventListener('click',()=>{if(playBtn.disabled)return;setPlay(!paused);});
function syncPlayForMode(){const lock=(mode==='shape');if(lock)setPlay(false);   // shaping always spins
  playBtn.disabled=lock;playBtn.style.opacity=lock?.4:1;playBtn.style.cursor=lock?'not-allowed':'pointer';
  playBtn.title=lock?'Spin can\u2019t be paused while shaping':'Pause / play spin';}
syncPlayForMode();
const layersEl=document.getElementById('layers');
function markActive(){layersEl.querySelectorAll('.lrow[data-layer]').forEach(r=>r.classList.toggle('on',+r.dataset.layer===activeLayer));}
function buildLayerStack(){layersEl.innerHTML='';
  // top of the visual list = top of the paint stack = last in layerOrder
  for(let k=layerOrder.length-1;k>=0;k--){const i=layerOrder[k];
    const row=document.createElement('div');row.className='lrow';row.dataset.layer=i;
    row.innerHTML=`<span class="grip" title="Drag to reorder">⋮⋮</span><canvas class="thumb" data-thumb="${i}" width="48" height="48"></canvas><span class="lname">Layer ${i+1}</span><span class="lx" title="Clear layer">✕</span>`;
    row.addEventListener('click',ev=>{if(ev.target.classList.contains('lx')){ev.stopPropagation();layerC[i].getContext('2d').clearRect(0,0,TEX_W,TEX_H);composite();return;}activeLayer=i;markActive();});
    attachDrag(row);
    layersEl.appendChild(row);}
  const bgrow=document.createElement('div');bgrow.className='lrow bg';
  bgrow.innerHTML=`<span class="thumb" id="bgThumb"></span><span class="lname">Base colour</span><span style="font-size:10px;color:#8a7c6a;letter-spacing:.08em;">GLAZE ›</span>`;
  bgrow.addEventListener('click',openGlaze);layersEl.appendChild(bgrow);
  markActive();updateSwatches();updateLayerThumbs();}

/* render each layer's paint as vertical colour bands (X = around the pot) */
function updateLayerThumbs(){
  const BANDS=8;
  layersEl.querySelectorAll('canvas[data-thumb]').forEach(cv=>{
    const i=+cv.dataset.thumb,src=layerC[i],sx=src.getContext('2d');
    const W=cv.width,H=cv.height,ctx=cv.getContext('2d');ctx.clearRect(0,0,W,H);
    const colW=Math.floor(TEX_W/BANDS),bw=W/BANDS;
    for(let b=0;b<BANDS;b++){
      const data=sx.getImageData(b*colW,0,Math.max(1,colW),TEX_H).data;
      let r=0,g=0,bl=0,a=0,n=0;
      for(let p=0;p<data.length;p+=4*97){const al=data[p+3];if(al>8){r+=data[p]*al;g+=data[p+1]*al;bl+=data[p+2]*al;a+=al;}n++;}
      if(a>0){r=Math.round(r/a);g=Math.round(g/a);bl=Math.round(bl/a);const cov=Math.min(1,(a/255)/(n||1)*BANDS);
        ctx.fillStyle=`rgb(${r},${g},${bl})`;ctx.globalAlpha=0.35+0.65*cov;ctx.fillRect(b*bw,0,Math.ceil(bw),H);ctx.globalAlpha=1;}
    }
  });
}

/* pointer-based drag reordering (touch + mouse). Reorders the paint rows only; Background stays pinned. */
let dragState=null;
function attachDrag(row){const grip=row.querySelector('.grip');if(!grip)return;
  grip.addEventListener('pointerdown',e=>{e.preventDefault();e.stopPropagation();
    const rows=[...layersEl.querySelectorAll('.lrow[data-layer]')];
    dragState={row,startY:e.clientY,rows,h:row.offsetHeight};
    row.classList.add('dragging');grip.setPointerCapture(e.pointerId);});
  grip.addEventListener('pointermove',e=>{if(!dragState||dragState.row!==row)return;
    const dy=e.clientY-dragState.startY;row.style.transform=`translateY(${dy}px)`;row.style.zIndex=5;});
  grip.addEventListener('pointerup',e=>{if(!dragState||dragState.row!==row)return;
    row.classList.remove('dragging');row.style.transform='';row.style.zIndex='';
    const fromCanvas=+row.dataset.layer;
    const siblings=[...layersEl.querySelectorAll('.lrow[data-layer]')].filter(r=>r!==row);
    let visualPos=siblings.length;                       // default: drop at bottom
    for(let j=0;j<siblings.length;j++){const b=siblings[j].getBoundingClientRect();
      if(e.clientY<b.top+b.height/2){visualPos=j;break;}}
    let vis=layerOrder.slice().reverse();                // top→bottom canvas indices
    vis.splice(vis.indexOf(fromCanvas),1);               // remove dragged
    vis.splice(visualPos,0,fromCanvas);                  // insert at new visual slot
    layerOrder=vis.reverse();                            // back to bottom→top
    dragState=null;composite();buildLayerStack();});}

buildLayerStack();
thumbsReady=true;updateLayerThumbs();
document.getElementById('layersToggle').addEventListener('click',()=>{
  const ls=document.getElementById('layers'),car=document.getElementById('layersCaret');

/* ============================================================ EXPORT ============================================================ */
const A4=[1754,1240];
const PXcm=A4[0]/29.7;            // ≈59 px per cm on a landscape A4 sheet
const SS=2;                       // supersample: render pages at SS× then print/export sharp
/* size a page canvas to SS× and scale the context so all A4-coordinate drawing stays identical but high-res */
function pageCtx(cv){cv.width=A4[0]*SS;cv.height=A4[1]*SS;const ctx=cv.getContext('2d');
  ctx.setTransform(SS,0,0,SS,0,0);ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='high';return ctx;}
/* px-per-world-unit used by the printable net (defines the real printed size) */
const GORES=12;
/* gore (petal) development — the only flat layout that folds into a curved surface of revolution */
function layoutGores(p){const B=box(),N=GORES,tabW=18;
  // scale to fill the sheet well (big pots large, small pots still substantial); gores + orthos share this exact PXM
  const PXMw=(B.w*0.96 - N*tabW)/(2*Math.PI*p.maxR);
  const PXMh=(B.h*0.9)/p.total;
  const PXM=Math.min(PXMw,PXMh);
  const petalMax=2*Math.PI*p.maxR*PXM/N;
  const colW=petalMax+tabW, totalW=colW*N, ah=p.total*PXM;
  return {N,tabW,PXM,petalMax,colW,totalW,ah,ax:B.x+(B.w-totalW)/2,ay:B.y+(B.h-ah)/2};}
function printScale(p){return layoutGores(p).PXM;}   // ortho views share this exact scale
function drawGores(ctx,p,L,src,style){const ink=inkColor();
  ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='high';
  const srcW=TEX_W/L.N;
  // fractional band index at a vertical fraction (no rounding → no skipped texture rows)
  const idxAt=fr=>clamp(NSEG-idxBySlant(p,clamp(fr,0,1)),0,NSEG);
  const srcYAt=fr=>(1-idxAt(fr)/NSEG)*(TEX_H-1);
  const hwAt=fr=>{const i=idxAt(fr);const lo=Math.floor(i),t=i-lo;const r=p.rs[lo]+(p.rs[Math.min(NSEG,lo+1)]-p.rs[lo])*t;return(L.petalMax/2)*(r/p.maxR);};
  for(let k=0;k<L.N;k++){const colX=L.ax+k*L.colW, cx=colX+L.petalMax/2, srcX=k/L.N*TEX_W;
    for(let py=0;py<L.ah;py++){
      const hw=hwAt(py/L.ah);
      // source span covering THIS output row through the next, so every texture row is drawn
      let sy0=srcYAt(py/L.ah), sy1=srcYAt((py+1)/L.ah);if(sy1<sy0){const t=sy0;sy0=sy1;sy1=t;}
      const sh=Math.max(1,sy1-sy0);
      ctx.drawImage(src,srcX,sy0,srcW,sh,cx-hw,L.ay+py,Math.max(hw*2,1),py+1<L.ah?2:1);}
    const Lp=[],Rp=[];for(let py=0;py<=L.ah;py+=3){const i=clamp(Math.round(NSEG-idxBySlant(p,Math.min(py,L.ah)/L.ah)),0,NSEG);
      const hw=(L.petalMax/2)*(p.rs[i]/p.maxR);Lp.push([cx-hw,L.ay+py]);Rp.push([cx+hw,L.ay+py]);}
    const M=Rp.length-1;
    // outward unit normals along the right edge (perpendicular, pointing away from the petal)
    const nrm=Rp.map((pt,j)=>{const a=Rp[Math.max(0,j-1)],b=Rp[Math.min(M,j+1)];
      let dx=b[0]-a[0],dy=b[1]-a[1];const m=Math.hypot(dx,dy)||1;let nx=dy/m,ny=-dx/m;if(nx<0){nx=-nx;ny=-ny;}return[nx,ny];});
    const outer=Rp.map((pt,j)=>[pt[0]+nrm[j][0]*L.tabW,pt[1]+nrm[j][1]*L.tabW]);
    // serrate into teeth so the curved seam folds cleanly (globe-gore method)
    const nT=clamp(Math.round(L.ah/40),4,18),Pp=M/nT,g=Math.max(1,Math.round(Pp*0.18)),teeth=[];
    for(let t=0;t<nT;t++){const lo=Math.round(M-t*Pp),hi=Math.max(0,Math.round(M-(t+1)*Pp)),loIn=Math.max(hi+1,lo-g);teeth.push([hi,loIn,lo]);}
    // glue land (guides only): fill each tooth faint green
    if(style!=='clean'){ctx.save();ctx.fillStyle='rgba(31,157,87,.18)';
      for(const [hi,loIn] of teeth){ctx.beginPath();ctx.moveTo(Rp[hi][0],Rp[hi][1]);
        for(let j=hi;j<=loIn;j++)ctx.lineTo(Rp[j][0],Rp[j][1]);
        for(let j=loIn;j>=hi;j--)ctx.lineTo(outer[j][0],outer[j][1]);ctx.closePath();ctx.fill();}ctx.restore();}
    // CUT outline — RED — petal silhouette + serrated glue comb up the right edge
    ctx.lineWidth=style==='clean'?1:2;ctx.strokeStyle=style==='clean'?'rgba(20,17,13,.4)':RED;ctx.setLineDash([]);ctx.lineCap='butt';ctx.beginPath();
    Lp.forEach((pt,j)=>j?ctx.lineTo(pt[0],pt[1]):ctx.moveTo(pt[0],pt[1]));
    ctx.lineTo(Rp[M][0],Rp[M][1]);
    for(let t=0;t<nT;t++){const [hi,loIn,lo]=teeth[t];
      for(let j=lo;j>=loIn;j--)ctx.lineTo(Rp[j][0],Rp[j][1]);
      ctx.lineTo(outer[loIn][0],outer[loIn][1]);
      for(let j=loIn-1;j>=hi;j--)ctx.lineTo(outer[j][0],outer[j][1]);
      ctx.lineTo(Rp[hi][0],Rp[hi][1]);}
    ctx.closePath();ctx.stroke();
    if(style!=='clean'){
      ctx.lineCap='round';
      // GLUE TAB fold — GREEN dashed
      ctx.save();ctx.globalAlpha=.95;ctx.setLineDash([7,5]);ctx.lineWidth=2;ctx.strokeStyle=GREEN;ctx.beginPath();
      Rp.forEach((pt,j)=>j?ctx.lineTo(pt[0],pt[1]):ctx.moveTo(pt[0],pt[1]));ctx.stroke();ctx.restore();
      // SCORE & CURL centre — COBALT dotted
      ctx.save();ctx.globalAlpha=.95;ctx.setLineDash([3,5]);ctx.lineWidth=2;ctx.strokeStyle=COBALT;ctx.beginPath();ctx.moveTo(cx,L.ay);ctx.lineTo(cx,L.ay+L.ah);ctx.stroke();ctx.restore();
      ctx.fillStyle=inkColor();ctx.globalAlpha=.85;ctx.font='800 11px "Archivo"';ctx.textAlign='center';ctx.fillText(k+1,cx,L.ay-7);ctx.textAlign='left';ctx.globalAlpha=1;}
  }}

function profile(){const ys=[],rs=[];for(let i=0;i<=NSEG;i++){ys.push(-height/2+(i/NSEG)*height);rs.push(R[i]);}
  const slant=[0];for(let i=1;i<=NSEG;i++)slant.push(slant[i-1]+Math.hypot(ys[i]-ys[i-1],rs[i]-rs[i-1]));return{ys,rs,slant,total:slant[NSEG],maxR:Math.max(...rs)};}
function idxBySlant(p,frac){const tgt=frac*p.total;for(let i=1;i<=NSEG;i++){if(p.slant[i]>=tgt){const sp=p.slant[i]-p.slant[i-1]||1;return(i-1)+(tgt-p.slant[i-1])/sp;}}return NSEG;}
function folds(p){const out=[];let acc=0,lastI=0,prev=Math.atan2(p.rs[1]-p.rs[0],p.ys[1]-p.ys[0]);
  for(let i=1;i<NSEG;i++){const a=Math.atan2(p.rs[i+1]-p.rs[i],p.ys[i+1]-p.ys[i]);acc+=Math.abs(a-prev);prev=a;
    if(acc>=0.16&&i-lastI>=2){const curv=p.rs[i+1]-2*p.rs[i]+p.rs[i-1];out.push({i,frac:p.slant[i]/p.total,mountain:curv<0});acc=0;lastI=i;}}return out;}

function chrome(ctx,W,H,num,title,instr,lt){
  fillBg(ctx,W,H);                     // the editable background prints here
  const ink=inkColor();
  ctx.strokeStyle=ink;ctx.lineWidth=2.5;roundRect(ctx,44,40,228,40,20);ctx.stroke();
  ctx.fillStyle=ink;ctx.font='900 18px "Archivo"';ctx.textAlign='center';ctx.fillText('PAPER POTTERY',158,66);ctx.textAlign='left';
  ctx.font='900 96px "Archivo"';ctx.fillText(num,44,H-110);
  ctx.font='600 40px "Fraunces"';ctx.fillText(title,180,H-120);
  ctx.font='italic 400 22px "Fraunces"';wrap(ctx,instr,180,H-86,W-360,30);
  legend(ctx,W,H,lt||'gore');
  rulerBar(ctx,W);
  return ink;
}
function legend(ctx,W,H,type){const items=type==='fold'
    ?[['MOUNTAIN FOLD',CORAL,[10,7]],['VALLEY FOLD',COBALT,[3,6]]]
    :[['GLUE TAB',GREEN,[7,5]],['SCORE / CURL',COBALT,[3,5]],['CUT',RED,[]]];
  let x=W-44,y=H-40;ctx.textAlign='right';ctx.font='800 13px "Archivo"';
  for(const [lab,col,dash] of items){ctx.fillStyle=col;ctx.fillText(lab,x,y+4);const w=ctx.measureText(lab).width;
    const lx2=x-w-8,lx1=lx2-34;ctx.strokeStyle=col;ctx.lineCap='round';ctx.lineWidth=2.8;ctx.setLineDash(dash);
    ctx.beginPath();ctx.moveTo(lx1,y);ctx.lineTo(lx2,y);ctx.stroke();ctx.setLineDash([]);x=lx1-24;}
  ctx.textAlign='left';
}
function rulerBar(ctx,W){const mmpx=W/297,len=100*mmpx,x=W-44-len,y=58,ink=inkColor();
  ctx.save();ctx.strokeStyle=ink;ctx.fillStyle=ink;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+len,y);
  for(let mm=0;mm<=100;mm+=10){const tx=x+mm*mmpx;ctx.moveTo(tx,y);ctx.lineTo(tx,y-(mm%50===0?12:7));}ctx.stroke();
  ctx.font='700 12px "Archivo"';ctx.textAlign='right';
  ctx.fillText('100 mm  ·  PRINT AT 100%, DO NOT SCALE / FIT TO PAGE',x+len,y+18);ctx.textAlign='left';ctx.restore();
}
function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function wrap(ctx,text,x,y,maxW,lh){const words=text.split(' ');let line='',yy=y;for(const w of words){const t=line+w+' ';if(ctx.measureText(t).width>maxW&&line){ctx.fillText(line,x,yy);line=w+' ';yy+=lh;}else line=t;}ctx.fillText(line,x,yy);}
function box(){return{x:44,y:120,w:A4[0]-88,h:A4[1]-120-200};}
/* soft fold-line drawing */
function foldLine(ctx,x1,y,x2,mountain){ctx.save();ctx.globalAlpha=0.55;ctx.lineCap='round';ctx.lineWidth=2;
  ctx.strokeStyle=mountain?CORAL:COBALT;ctx.beginPath();ctx.moveTo(x1,y);ctx.lineTo(x2,y);ctx.stroke();ctx.restore();}

function buildNetPage(cv){const ctx=pageCtx(cv);
  const ink=chrome(ctx,A4[0],A4[1],'01','Flat Preview',caps[0],'fold');
  const p=profile(),B=box();const PXM=Math.min(B.w/(2*Math.PI*p.maxR),B.h/p.total)*0.9;
  const ah=p.total*PXM,cx=B.x+B.w/2,ay=B.y+(B.h-ah)/2;
  ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='high';
  const idxAt=fr=>clamp(NSEG-idxBySlant(p,clamp(fr,0,1)),0,NSEG);
  const srcYAt=fr=>(1-idxAt(fr)/NSEG)*(TEX_H-1);
  const rAt=fr=>{const i=idxAt(fr),lo=Math.floor(i),t=i-lo;return p.rs[lo]+(p.rs[Math.min(NSEG,lo+1)]-p.rs[lo])*t;};
  for(let py=0;py<ah;py++){const rowW=2*Math.PI*rAt(py/ah)*PXM;
    let sy0=srcYAt(py/ah),sy1=srcYAt((py+1)/ah);if(sy1<sy0){const t=sy0;sy0=sy1;sy1=t;}const sh=Math.max(1,sy1-sy0);
    ctx.drawImage(texCanvas,0,sy0,TEX_W,sh,cx-rowW/2,ay+py,rowW,py+1<ah?2:1);}
  ctx.strokeStyle=ink;ctx.lineWidth=2.5;ctx.beginPath();
  for(let i=NSEG;i>=0;i--){const py=ay+((NSEG-i)/NSEG)*ah,x=cx-Math.PI*p.rs[i]*PXM;i===NSEG?ctx.moveTo(x,py):ctx.lineTo(x,py);}
  for(let i=0;i<=NSEG;i++){const py=ay+((NSEG-i)/NSEG)*ah;ctx.lineTo(cx+Math.PI*p.rs[i]*PXM,py);}ctx.closePath();ctx.stroke();
  folds(p).forEach(f=>{const py=ay+(1-f.frac)*ah,hw=Math.PI*p.rs[f.i]*PXM;foldLine(ctx,cx-hw,py,cx+hw,f.mountain);});
  dimsLabel(ctx,p);}
function dimsLabel(ctx,p){const sc=printScale(p)/PXcm;ctx.fillStyle=inkColor();ctx.font='700 14px "Archivo"';
  ctx.fillText(`PIECE \u2248 ${(height*sc).toFixed(1)} cm TALL  ·  ${(2*p.maxR*sc).toFixed(1)} cm WIDE  ·  ${GORES} GORES`,44,98);}

function buildOrthoPage(cv,onDone){const prevRot=pot.rotation.y;const VPX=520,imgs=[];
  try{
    pot.rotation.y=0;base.visible=false;scene.background=new THREE.Color(0xffffff);
    const s=height/2+0.6,ocam=new THREE.OrthographicCamera(-s,s,s,-s,0.1,100);
    renderer.setSize(VPX,VPX,false);
    const shoot=(pos,up)=>{ocam.position.set(...pos);ocam.up.set(...up);ocam.lookAt(0,0,0);ocam.updateProjectionMatrix();renderer.render(scene,ocam);return renderer.domElement.toDataURL('image/png');};
    imgs.push(['Front',shoot([0,0,10],[0,1,0])]);
    imgs.push(['Right',shoot([10,0,0],[0,1,0])]);
    imgs.push(['Back',shoot([0,0,-10],[0,1,0])]);
    imgs.push(['Left',shoot([-10,0,0],[0,1,0])]);
  }catch(err){console.error('ortho side render failed',err);}
  finally{ scene.background=null;base.visible=true;pot.rotation.y=prevRot;resize(); }
  const ctx=pageCtx(cv);const ink=chrome(ctx,A4[0],A4[1],'02','Six Views',caps[1]);
  const p=profile(),PXM=printScale(p),scaleCm=PXM/PXcm,s=height/2+0.6,cellTrue=2*s*PXM;
  const cols=3,rows=2,B=box(),gap=22;
  const f=Math.min(1,(B.w-gap*(cols-1))/(cols*cellTrue),(B.h-gap*(rows-1))/(rows*cellTrue));
  const cell=cellTrue*f,gx=B.x+(B.w-(cell*cols+gap*(cols-1)))/2,gy=B.y+(B.h-(cell*rows+gap*(rows-1)))/2;
  const cellAt=k=>[gx+(k%cols)*(cell+gap),gy+Math.floor(k/cols)*(cell+gap)];
  const frame=(cxx,cyy,name)=>{ctx.strokeStyle='rgba(0,0,0,.16)';ctx.lineWidth=1.2;ctx.strokeRect(cxx,cyy,cell,cell);
    ctx.fillStyle=ink;ctx.font='800 15px "Archivo"';ctx.fillText(name.toUpperCase(),cxx+9,cyy+22);};
  // --- TOP / BOTTOM: hollow open tube. The rim is a ring; every section that bulges OUTWARD
  // beyond it shows as its own concentric band. Nothing is filled solid, there is no base. ---
  const tctx=texCanvas.getContext('2d');
  const rowColor=(i)=>{const srcY=Math.round((1-i/NSEG)*(TEX_H-1));
    const d=tctx.getImageData(0,Math.max(0,Math.min(TEX_H-1,srcY)),TEX_W,1).data;
    let r=0,g=0,b=0,n=0;const step=Math.max(1,Math.floor(TEX_W/24))*4;
    for(let x=0;x<d.length;x+=step){r+=d[x];g+=d[x+1];b+=d[x+2];n++;}
    return [Math.round(r/n),Math.round(g/n),Math.round(b/n)];};
  const wallU=Math.max(0.05,Math.min(0.13,p.maxR*0.07));   // band thickness in model units
  const drawPlan=(slot,name,fromTop)=>{const [cxx,cyy]=cellAt(slot);
    ctx.save();ctx.beginPath();ctx.rect(cxx,cyy,cell,cell);ctx.clip();
    ctx.fillStyle='#fff';ctx.fillRect(cxx,cyy,cell,cell);
    const cx=cxx+cell/2,cy=cyy+cell/2;
    // walk from this end inward; keep each radius that pushes OUT beyond everything nearer (the bulges)
    const order=fromTop?[...Array(NSEG+1).keys()].reverse():[...Array(NSEG+1).keys()];
    let raw=[];let seen=-1;
    for(const i of order){const r=p.rs[i];if(r>seen+0.015){raw.push({r,i});seen=r;}}
    if(!raw.length)raw.push({r:p.rs[fromTop?NSEG:0],i:fromTop?NSEG:0});
    // keep it readable & clearly hollow: rim + widest + a few steps between (max 6 rings)
    let bands;const MAXB=6;
    if(raw.length<=MAXB){bands=raw;}else{bands=[];for(let k=0;k<MAXB;k++)bands.push(raw[Math.round(k*(raw.length-1)/(MAXB-1))]);}
    // draw inner→outer so outer rings sit on top; each is a hollow ring of wall thickness
    bands.forEach((bd,idx)=>{const ro=bd.r*PXM*f, ri=Math.max(0,(bd.r-wallU)*PXM*f);
      const c=rowColor(bd.i);
      ctx.beginPath();ctx.arc(cx,cy,ro,0,Math.PI*2);if(ri>0.5)ctx.arc(cx,cy,ri,0,Math.PI*2);
      ctx.fillStyle=`rgb(${c[0]},${c[1]},${c[2]})`;ctx.fill('evenodd');
      // crisp outer edge for the rim (first band) + thin edge for bulges
      ctx.lineWidth=idx===0?2:1.4;ctx.strokeStyle=idx===0?'rgba(0,0,0,.5)':'rgba(0,0,0,.28)';
      ctx.beginPath();ctx.arc(cx,cy,ro,0,Math.PI*2);ctx.stroke();});
    // dashed guide of the open mouth (innermost radius) so it reads as hollow
    const rIn=p.rs[fromTop?NSEG:0]*PXM*f;
    ctx.save();ctx.setLineDash([4,4]);ctx.globalAlpha=.5;ctx.lineWidth=1.1;ctx.strokeStyle=inkColor();
    ctx.beginPath();ctx.arc(cx,cy,Math.max(0,rIn-wallU*PXM*f),0,Math.PI*2);ctx.stroke();ctx.restore();
    const rEnd=p.rs[fromTop?NSEG:0];
    ctx.fillStyle=inkColor();ctx.globalAlpha=.7;ctx.font='italic 400 12px "Fraunces"';ctx.textAlign='center';
    ctx.fillText((2*p.maxR*scaleCm).toFixed(1)+' cm max wide · '+(2*rEnd*scaleCm).toFixed(1)+' cm '+(fromTop?'rim':'foot'),cx,cyy+cell-12);
    ctx.globalAlpha=1;ctx.restore();frame(cxx,cyy,name);};
  let loaded=0;const total=imgs.length||1;
  imgs.forEach(([name,data],k)=>{const im=new Image();im.onload=()=>{const [cxx,cyy]=cellAt(k);
    ctx.fillStyle='#fff';ctx.fillRect(cxx,cyy,cell,cell);ctx.drawImage(im,cxx,cyy,cell,cell);frame(cxx,cyy,name);
    if(++loaded===total){drawPlan(4,'Top',true);drawPlan(5,'Bottom',false);if(curPage===1)showPage(1);if(onDone)onDone();}};im.src=data;});
  const realH=(height*scaleCm).toFixed(1),realDia=(2*p.maxR*scaleCm).toFixed(1);
  ctx.fillStyle=ink;ctx.font='800 15px "Archivo"';ctx.textAlign='center';
  ctx.fillText(`FOR REFERENCE · FINISHED PIECE \u2248 ${realH} CM TALL · ${realDia} CM WIDE`,A4[0]/2,104);ctx.textAlign='left';}

function layoutArt(p){const B=box();const PXM=printScale(p);const aw=2*Math.PI*p.maxR*PXM,ah=p.total*PXM;return{aw,ah,ax:B.x+(B.w-aw)/2,ay:B.y+(B.h-ah)/2,PXM};}
/* artwork over the editable background (so the bg prints behind unpainted clay) */
function artCanvas(){const a=document.createElement('canvas');a.width=TEX_W;a.height=TEX_H;const x=a.getContext('2d');x.drawImage(clayBase,0,0);for(const idx of layerOrder)x.drawImage(layerC[idx],0,0);return a;}
function drawArtBlock(ctx,p,L,src){ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='high';
  const idxAt=fr=>clamp(NSEG-idxBySlant(p,clamp(fr,0,1)),0,NSEG);
  const srcYAt=fr=>(1-idxAt(fr)/NSEG)*(TEX_H-1);
  for(let py=0;py<L.ah;py++){let sy0=srcYAt(py/L.ah),sy1=srcYAt((py+1)/L.ah);if(sy1<sy0){const t=sy0;sy0=sy1;sy1=t;}const sh=Math.max(1,sy1-sy0);
    ctx.drawImage(src,0,sy0,TEX_W,sh,L.ax,L.ay+py,L.aw,py+1<L.ah?2:1);}}
function trimTab(ctx,L,ink){ctx.strokeStyle=ink;ctx.lineWidth=2;ctx.strokeRect(L.ax,L.ay,L.aw,L.ah);
  ctx.save();ctx.globalAlpha=.5;ctx.setLineDash([4,5]);ctx.strokeStyle=ink;ctx.strokeRect(L.ax-22,L.ay,22,L.ah);ctx.restore();
  ctx.fillStyle=ink;ctx.save();ctx.translate(L.ax-11,L.ay+L.ah/2);ctx.rotate(-Math.PI/2);ctx.globalAlpha=.6;ctx.font='600 11px "Archivo"';ctx.textAlign='center';ctx.fillText('GLUE',0,4);ctx.restore();ctx.textAlign='left';}

function buildPrintLines(cv){const ctx=pageCtx(cv);chrome(ctx,A4[0],A4[1],'03','Print · Assembly',caps[2]);
  const p=profile(),L=layoutGores(p);drawGores(ctx,p,L,artCanvas(),'guides');dimsLabel(ctx,p);}

function buildPrintMarks(cv){const ctx=pageCtx(cv);chrome(ctx,A4[0],A4[1],'04','Print · Clean',caps[3]);
  const p=profile(),L=layoutGores(p);drawGores(ctx,p,L,artCanvas(),'clean');dimsLabel(ctx,p);}

/* ---------- Instagram-ready post export ---------- */
function renderPotHiRes(size,angle){
  const prevRot=pot.rotation.y, prevBaseRot=base.rotation.y, prevBg=scene.background, prevBase=base.visible, prevPR=renderer.getPixelRatio();
  pot.rotation.y=angle; base.rotation.y=angle; base.visible=true; scene.background=null;
  renderer.setPixelRatio(2);                          // 2× supersample → crisp output
  const cam=new THREE.PerspectiveCamera(34,1,0.1,100);
  const topY=height/2, botY=-height/2-0.14;           // rim down to under the plate
  const cy=(topY+botY)/2, halfV=(topY-botY)/2, halfW=2.2;   // plate radius (~2) incl. margin
  const vFov=34*Math.PI/180,t=Math.tan(vFov/2);
  const dist=(Math.max(halfV,halfW)+0.4)/t;           // square render → fit the larger axis
  cam.position.set(0,cy,dist); cam.lookAt(0,cy,0); cam.updateProjectionMatrix();
  renderer.setSize(size,size,false);
  renderer.render(scene,cam);
  const data=renderer.domElement.toDataURL('image/png');
  renderer.setPixelRatio(prevPR);
  scene.background=prevBg; pot.rotation.y=prevRot; base.rotation.y=prevBaseRot; base.visible=prevBase; resize();
  return data;
}
function igCompose(W,H,potData,pieceName,cb){
  const cv=document.createElement('canvas');cv.width=W;cv.height=H;const ctx=cv.getContext('2d');
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#ffffff');g.addColorStop(1,'#d7e6f6');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  const rg=ctx.createRadialGradient(W*0.5,H*0.34,0,W*0.5,H*0.34,W*0.7);rg.addColorStop(0,'rgba(120,150,200,.10)');rg.addColorStop(1,'rgba(120,150,200,0)');ctx.fillStyle=rg;ctx.fillRect(0,0,W,H);
  const im=new Image();im.onload=()=>{
    const ps=Math.min(W,H)*0.96, px=(W-ps)/2, py=(H-ps)/2;
    ctx.drawImage(im,px,py,ps,ps);                    // clean — no floating shadow
    // badge top-right
    const labelF=Math.round(W*0.026);ctx.font=`900 ${labelF}px "Archivo"`;
    const label='PAPER POTTERY',pad=W*0.022,tw=ctx.measureText(label).width,bw=tw+pad*2,bh=W*0.058,bx=W-bw-W*0.06,by=H*0.06;
    ctx.lineWidth=Math.max(2,W*0.0035);ctx.strokeStyle='#14110d';roundRect(ctx,bx,by,bw,bh,bh/2);ctx.stroke();
    ctx.fillStyle='#14110d';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(label,bx+bw/2,by+bh/2+1);
    // piece name top-left, serif (Fraunces), baseline aligned to the badge text baseline
    if(pieceName){const baseY=by+bh/2+labelF*0.36;
      ctx.textAlign='left';ctx.textBaseline='alphabetic';ctx.fillStyle='#14110d';
      let fs=Math.round(W*0.044);const maxW=bx-W*0.06-W*0.03;
      ctx.font=`600 ${fs}px "Fraunces"`;
      while(ctx.measureText(pieceName).width>maxW&&fs>14){fs-=1;ctx.font=`600 ${fs}px "Fraunces"`;}
      ctx.fillText(pieceName,W*0.06,baseY);}
    ctx.textAlign='left';ctx.textBaseline='alphabetic';
    cv.toBlob(b=>cb(b),'image/png');
  };im.src=potData;
}
function igExport(W,H){
  const pieceName=(document.getElementById('pieceName').value||'').trim();
  const slug=(pieceName||'piece').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')||'piece';
  const angles=[['front',0],['right',-Math.PI/2],['back',Math.PI],['left',Math.PI/2]];
  const files=[];let i=0;
  (function next(){
    if(i>=angles.length){
      // package the four sides together
      if(window.JSZip){const zip=new JSZip();files.forEach(f=>zip.file(f.name,f.blob));
        zip.generateAsync({type:'blob'}).then(zb=>{const a=document.createElement('a');
          a.download=`paper-pottery-${slug}-${W}x${H}.zip`;a.href=URL.createObjectURL(zb);a.click();setTimeout(()=>URL.revokeObjectURL(a.href),4000);});
      }else{ // fallback: download individually
        files.forEach((f,k)=>setTimeout(()=>{const a=document.createElement('a');a.download=f.name;a.href=URL.createObjectURL(f.blob);a.click();setTimeout(()=>URL.revokeObjectURL(a.href),4000);},k*350));}
      return;}
    const [angleName,ang]=angles[i++];
    const data=renderPotHiRes(Math.round(Math.min(W,H)*0.96),ang);
    igCompose(W,H,data,pieceName,blob=>{files.push({name:`paper-pottery-${slug}-${angleName}-${W}x${H}.png`,blob});next();});
  })();
}
document.getElementById('ig11').addEventListener('click',()=>{if(window.gtag)gtag('event','export_image',{format:'1:1',w:1200,h:1200});igExport(1200,1200);});
document.getElementById('ig34').addEventListener('click',()=>{if(window.gtag)gtag('event','export_image',{format:'3:4',w:1080,h:1440});igExport(1080,1440);});

/* ---------- optimized 360° video export ---------- */
function igVideo(){
  const W=1080,H=1080,FPS=30,SECS=8,TURNS=2,frames=FPS*SECS;
  const btn=document.getElementById('igvid');if(btn.dataset.busy)return;btn.dataset.busy='1';const oldTxt=btn.textContent;btn.textContent='…';
  const pieceName=(document.getElementById('pieceName').value||'').trim();
  // offscreen branded canvas we record from
  const out=document.createElement('canvas');out.width=W;out.height=H;const octx=out.getContext('2d');
  // hi-res 3D render target (square)
  const RS=Math.round(Math.min(W,H)*0.96);
  const prevRot=pot.rotation.y, prevBaseRot=base.rotation.y, prevBg=scene.background, prevBase=base.visible, prevPR=renderer.getPixelRatio();
  base.visible=true; base.rotation.y=0; scene.background=null; renderer.setPixelRatio(2);
  const cam=new THREE.PerspectiveCamera(34,1,0.1,100);
  const topY=height/2, botY=-height/2-0.14, cy=(topY+botY)/2, halfV=(topY-botY)/2, halfW=2.2;
  const t=Math.tan(34*Math.PI/360), dist=(Math.max(halfV,halfW)+0.4)/t;
  cam.position.set(0,cy,dist); cam.lookAt(0,cy,0); cam.updateProjectionMatrix();
  renderer.setSize(RS,RS,false);
  // pick a supported container — prefer mp4, fall back to webm
  const types=['video/mp4;codecs=avc1.42E01E','video/mp4','video/webm;codecs=vp9','video/webm'];
  const mime=types.find(t=>window.MediaRecorder&&MediaRecorder.isTypeSupported(t))||'video/webm';
  const ext=mime.startsWith('video/mp4')?'mp4':'webm';
  const stream=out.captureStream(FPS);
  const rec=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:6_000_000});
  const chunks=[];rec.ondataavailable=e=>{if(e.data.size)chunks.push(e.data);};
  rec.onstop=()=>{
    renderer.setPixelRatio(prevPR);scene.background=prevBg;pot.rotation.y=prevRot;base.rotation.y=prevBaseRot;base.visible=prevBase;resize();
    const slug=(pieceName||'piece').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')||'piece';
    const blob=new Blob(chunks,{type:mime});const a=document.createElement('a');a.download=`paper-pottery-${slug}-360.${ext}`;a.href=URL.createObjectURL(blob);a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),4000);btn.textContent=oldTxt;delete btn.dataset.busy;
  };
  let f=0;
  function frame(){
    pot.rotation.y=(f/frames)*Math.PI*2*TURNS; renderer.render(scene,cam);
    // branded background
    const g=octx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#ffffff');g.addColorStop(1,'#d7e6f6');octx.fillStyle=g;octx.fillRect(0,0,W,H);
    const rg=octx.createRadialGradient(W*0.5,H*0.34,0,W*0.5,H*0.34,W*0.7);rg.addColorStop(0,'rgba(120,150,200,.10)');rg.addColorStop(1,'rgba(120,150,200,0)');octx.fillStyle=rg;octx.fillRect(0,0,W,H);
    const ps=Math.min(W,H)*0.96,px=(W-ps)/2,py=(H-ps)/2;octx.drawImage(renderer.domElement,px,py,ps,ps);
    // badge + optional name (same layout as the still export)
    const labelF=Math.round(W*0.026);octx.font=`900 ${labelF}px "Archivo"`;
    const label='PAPER POTTERY',pad=W*0.022,tw=octx.measureText(label).width,bw=tw+pad*2,bh=W*0.058,bx=W-bw-W*0.06,by=H*0.06;
    octx.lineWidth=Math.max(2,W*0.0035);octx.strokeStyle='#14110d';roundRect(octx,bx,by,bw,bh,bh/2);octx.stroke();
    octx.fillStyle='#14110d';octx.textAlign='center';octx.textBaseline='middle';octx.fillText(label,bx+bw/2,by+bh/2+1);
    if(pieceName){const baseY=by+bh/2+labelF*0.36;octx.textAlign='left';octx.textBaseline='alphabetic';
      let fs=Math.round(W*0.044);const maxW=bx-W*0.06-W*0.03;octx.font=`600 ${fs}px "Fraunces"`;
      while(octx.measureText(pieceName).width>maxW&&fs>14){fs-=1;octx.font=`600 ${fs}px "Fraunces"`;}octx.fillText(pieceName,W*0.06,baseY);}
    octx.textAlign='left';octx.textBaseline='alphabetic';
    if(++f<=frames)requestAnimationFrame(frame);else rec.stop();
  }
  rec.start();requestAnimationFrame(frame);
}
document.getElementById('igvid').addEventListener('click',()=>{if(window.gtag)gtag('event','export_video_360');igVideo();});

function downloadPDF(){try{const {jsPDF}=window.jspdf;const pdf=new jsPDF({orientation:'landscape',unit:'pt',format:'a4'});
  const pw=pdf.internal.pageSize.getWidth(),ph=pdf.internal.pageSize.getHeight();
  // canvas is exact A4-landscape ratio → place full-bleed so on-page scale is precise (no fit-to-page shrink)
  pageCanvases.forEach((cv,i)=>{if(i)pdf.addPage();pdf.addImage(cv.toDataURL('image/png'),'PNG',0,0,pw,ph);});
  pdf.save('wheel-export.pdf');}catch(err){pageCanvases.forEach((cv,i)=>{const a=document.createElement('a');a.download=`wheel-page${i+1}.png`;a.href=cv.toDataURL('image/png');a.click();});}}
</script>
